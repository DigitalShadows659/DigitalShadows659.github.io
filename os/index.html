<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MehmetOS GNU/Linux</title>


<style>

body{
    background:#000;
    color:#00ff00;
    font-family:monospace;
    font-size:18px;
    padding:20px;
}


#terminal{
    white-space:pre-wrap;
}


input{

    background:transparent;
    border:none;
    outline:none;

    color:#00ff00;

    font-family:monospace;
    font-size:18px;

    width:300px;
}


.prompt{

    display:flex;

}


</style>

</head>


<body>


<div id="terminal"></div>



<script>


const terminal =
document.getElementById("terminal");



function print(text){

let div =
document.createElement("div");

div.innerHTML=text;

terminal.appendChild(div);

terminal.scrollTop =
terminal.scrollHeight;

}





let boot=[

"GNU GRUB version 2.12",
"",
"Loading MehmetOS GNU/Linux...",
"Loading kernel...",
"Loading initramfs...",
"",
"[ OK ] CPU initialized",
"[ OK ] Memory initialized",
"[ OK ] Drivers loaded",
"[ OK ] Filesystem mounted",
"[ OK ] Starting systemd",
"[ OK ] Network started",
"[ OK ] Login manager started",
"",
"MehmetOS GNU/Linux",
"System ready.",
""

];



let x=0;



function startBoot(){


if(x < boot.length){


print(boot[x]);

x++;


setTimeout(
startBoot,
350
);


}

else{


setTimeout(startTerminal,1000);


}


}







function startTerminal(){


terminal.innerHTML="";


print(
"MehmetOS GNU/Linux Terminal"
);


print(
"Type help for commands."
);


newInput();


}






function newInput(){



let row =
document.createElement("div");


row.className="prompt";



let text =
document.createElement("span");


text.innerHTML =
"root@mhtos:~$ ";



let input =
document.createElement("input");



row.appendChild(text);

row.appendChild(input);



terminal.appendChild(row);



input.focus();





input.addEventListener(
"keydown",
function(e){



if(e.key==="Enter"){


let value =
input.value.trim();



let cmd =
value.toLowerCase();



input.disabled=true;



print(
"root@mhtos:~$ "+value
);



runCommand(cmd,value);



}

});



}






function runCommand(cmd,value){



switch(cmd){



case "help":

print(
`
help
ls
pwd
whoami
uname
date
echo text
neofetch
clear
reboot
shutdown
`
);

break;





case "ls":

print(
"Documents  Downloads  Music  Pictures  Videos"
);

break;





case "pwd":

print("/root");

break;





case "whoami":

print("root");

break;





case "uname":

print(
"Linux mhtos 6.18-custom x86_64 GNU/Linux"
);

break;





case "date":

print(
new Date()
);

break;


let ram = navigator.deviceMemory || "Unknown";


print(
`
‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó
‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ
‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ
‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ
‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ
‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ

        MehmetOS
        
OS: MehmetOS GNU/Linux
Kernel: 6.18-mehmetos-custom
CPU Cores: ${navigator.hardwareConcurrency || "Unknown"}
RAM: ${ram} GB
Status: Online
`
);





case "clear":

terminal.innerHTML="";

break;





case "reboot":

location.reload();

break;





case "shutdown":

print(
"System halted."
);

break;





case "":

break;




default:


if(cmd.startsWith("echo ")){

print(
value.substring(5)
);

}

else{

print(
"bash: "+value+": command not found"
);

}


}



newInput();



}






startBoot();



</script>


</body>

</html>
