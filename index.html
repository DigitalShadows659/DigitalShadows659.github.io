<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mehmet - yazılım geliştirici. İngilizce ve Türkçe içerikler, teknoloji eleştirileri.">
    <meta name="keywords" content="Mehmet, yazılım, geliştirici, eleştiri, is-a-dev">

    <title>mehmet.is-a.dev</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 40px 30px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 25px;
            color: #ccc;
        }

        a {
            display: inline-block;
            background-color: #333;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
            width: 150px;
        }

        a:first-of-type {
            margin-bottom: 12px;
        }

        a:hover {
            background-color: #555;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌐 mehmet.is-a.dev</h1>
        <p>Select your language / Dilini seç</p>

        </div>
