<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
body {
  background: black;
}

#yazi {
  color: lime;
  font-family: monospace;
  font-size: 22px;
}
    footer {
      padding: 50px;
  </style>
</head>
<body>

<div id="yazi"></div>

<script>
let yazilar = [
  "Telefona giriliyor...",
  "Fotoğraflara erişiliyor...",
  "Hepsi siliniyor...",
  "İşlem tamam."
];

let i = 0;
let ekran = document.getElementById("yazi");

function yaz() {
  if (i < yazilar.length) {
    ekran.innerHTML += yazilar[i] + "<br>";
    i++;
    setTimeout(yaz, 2000);
  }
}

yaz();
</script>
  <footer>
    <p>Bu sahte bir simülatördür! Hack ve ya erişim içermez.</p>
  </footer>
</body>
</html>
